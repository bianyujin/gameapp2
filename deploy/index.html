<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <title>GAMEACG - 游戏整合平台</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="app-header" id="appHeader">
            <div class="header-title" id="headerTitle">首页</div>
            <div class="header-actions" id="headerActions"></div>
        </header>

        <main class="app-content" id="mainContent">
            <div id="page-home" class="page active">
                <div class="guide-banner" id="guideBanner" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; display: block;">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 24px;">📖</span>
                            <div>
                                <div style="font-weight: 600; color: white; font-size: 14px;">欢迎来到 GAMEACG</div>
                                <div style="color: rgba(255,255,255,0.9); font-size: 12px; margin-top: 4px;">首次使用需要在【我的】页面手动同步数据。当前还在建造中，可能存在bug，有问题可以公众号反馈或QQ反馈。</div>
                            </div>
                        </div>
                        <button onclick="App.hideGuideBanner()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;">知道了</button>
                    </div>
                </div>
                <div class="random-image-section">
                    <div class="random-image-container" id="randomImageContainer">
                        <img id="randomImage" src="" alt="随机图片" style="display: none;">
                        <div class="image-placeholder" id="imagePlaceholder">
                            <div class="placeholder-icon">🖼️</div>
                            <div class="placeholder-text">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-table" class="page">
                <div class="table-toolbar">
                    <div class="table-search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="tableSearch" placeholder="搜索...">
                    </div>
                    <button class="toolbar-btn" id="filterBtn" title="筛选">🔽</button>
                    <button class="toolbar-btn" id="sortBtn" title="排序">↕️</button>
                </div>

                <div class="games-grid" id="tableBody"></div>

                <div class="table-footer">
                    <div class="footer-info" id="tableInfo"></div>
                </div>
            </div>

            <div id="page-notion" class="page">
                <header class="page-header" style="display: flex; align-items: center; padding: 12px 16px; background: #1e1b4b; border-bottom: 1px solid #334155;">
                    <button class="back-btn" id="notionBackBtn" style="background: none; border: none; color: #a5b4fc; font-size: 16px; cursor: pointer; padding: 8px 12px; border-radius: 6px;">← 返回</button>
                    <h3 class="page-title" style="margin: 0; color: #e2e8f0; font-size: 16px;">备用</h3>
                </header>
                <div class="webview-container" id="notionWebView" style="height: calc(100vh - 120px); overflow: hidden;">
                    <iframe id="notionIframe" src="" style="width: 100%; height: 100%; border: none;"></iframe>
                </div>
            </div>

            <div id="page-profile" class="page">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <span class="avatar-text">GA</span>
                    </div>
                    <div class="profile-info">
                        <h2 class="profile-name">GAMEACG 用户</h2>
                        <p class="profile-email" style="cursor: pointer;" onclick="window.open('https://vlink.cc/bayj', '_blank')">vlink.cc/bayj</p>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 class="settings-title">我的数据</h3>
                    <div class="settings-list">
                        <div class="settings-item" onclick="App.showFavorites()" style="cursor: pointer;">
                            <span class="settings-icon">⭐</span>
                            <span class="settings-label">我的收藏</span>
                            <span class="settings-value" id="favoritesCount">0</span>
                        </div>
                        <div class="settings-item" onclick="App.showHistory()" style="cursor: pointer;">
                            <span class="settings-icon">📜</span>
                            <span class="settings-label">浏览历史</span>
                            <span class="settings-value" id="historyCount">0</span>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 class="settings-title">通用设置</h3>
                    <div class="settings-list">
                        <div class="settings-item">
                            <span class="settings-icon">🌙</span>
                            <span class="settings-label">夜间模式</span>
                            <label class="switch">
                                <input type="checkbox" checked id="darkModeToggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="settings-item">
                            <span class="settings-icon">🔄</span>
                            <span class="settings-label">自动更新</span>
                            <label class="switch">
                                <input type="checkbox" checked id="autoUpdateToggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 class="settings-title">用户</h3>
                    <div class="settings-list">
                        <div class="settings-item" id="userInfoItem">
                            <span class="settings-icon">👤</span>
                            <span class="settings-label" id="userStatusLabel">未登录</span>
                            <button class="btn-small" id="userLoginBtn">登录</button>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 class="settings-title">云端同步</h3>
                    <div class="settings-list">
                        <div class="settings-item">
                            <span class="settings-icon">☁️</span>
                            <span class="settings-label">从云端获取</span>
                            <button class="btn-small" id="syncFromCloudBtn">同步</button>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 class="settings-title">更多</h3>
                    <div class="settings-list">
                        <div class="settings-item" id="notionBackupBtn">
                            <span class="settings-icon">📋</span>
                            <span class="settings-label">备用</span>
                            <span class="settings-arrow">›</span>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 class="settings-title">关于</h3>
                    <div class="settings-list">
                        <div class="settings-item" id="versionItem">
                            <span class="settings-icon">ℹ️</span>
                            <span class="settings-label">版本</span>
                            <span class="settings-value">2.0.0</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="app-nav">
            <button class="nav-item active" data-page="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">首页</span>
            </button>
            <button class="nav-item" data-page="table">
                <span class="nav-icon">📁</span>
                <span class="nav-label">数据</span>
            </button>
            <button class="nav-item" data-page="profile">
                <span class="nav-icon">👤</span>
                <span class="nav-label">我的</span>
            </button>
        </nav>
    </div>

    <div id="toast" class="toast hidden"></div>

    <button class="add-game-fab" id="addGameFab" onclick="App.refreshPage()" title="刷新">🔄</button>

    <script src="js/app.js"></script>
    <script src="js/cloud-sync.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/review.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./sw.js')
                        .then((registration) => {
                            console.log('Service Worker 注册成功:', registration);
                        })
                        .catch((error) => {
                            console.log('Service Worker 注册失败:', error);
                        });
                });
            }
            
            const syncFromCloudBtn = document.getElementById('syncFromCloudBtn');
            if (syncFromCloudBtn) {
                syncFromCloudBtn.addEventListener('click', () => CloudSync.syncFromCloud());
            }
            
            const notionBackupBtn = document.getElementById('notionBackupBtn');
            if (notionBackupBtn) {
                notionBackupBtn.addEventListener('click', async () => {
                    App.openBackupPasswordModal();
                });
            }
            
            const notionBackBtn = document.getElementById('notionBackBtn');
            if (notionBackBtn) {
                notionBackBtn.addEventListener('click', () => {
                    if (App && App.switchPage) {
                        App.switchPage('profile');
                    }
                });
            }
            
            let versionClickCount = 0;
            let versionClickTimer = null;
            const versionItem = document.getElementById('versionItem');
            if (versionItem) {
                versionItem.addEventListener('click', () => {
                    versionClickCount++;
                    
                    if (versionClickTimer) {
                        clearTimeout(versionClickTimer);
                    }
                    
                    versionClickTimer = setTimeout(() => {
                        if (versionClickCount >= 5) {
                            if (!AdminSystem.config.isAdmin) {
                                AdminSystem.openAdminLogin();
                            } else {
                                AdminSystem.openAdminPanel();
                            }
                        }
                        versionClickCount = 0;
                    }, 2000);
                });
            }
            
            const userLoginBtn = document.getElementById('userLoginBtn');
            if (userLoginBtn) {
                userLoginBtn.addEventListener('click', () => {
                    if (ReviewSystem.isLoggedIn()) {
                        if (confirm('确定要退出登录吗？')) {
                            localStorage.removeItem('gamehub_current_user');
                            ReviewSystem.currentUser = null;
                            App.showToast('已退出登录');
                            location.reload();
                        }
                    } else {
                        ReviewSystem.openUserLogin();
                    }
                });
            }
            
            if (ReviewSystem.isLoggedIn()) {
                const userStatusLabel = document.getElementById('userStatusLabel');
                const userLoginBtn = document.getElementById('userLoginBtn');
                if (userStatusLabel) userStatusLabel.textContent = ReviewSystem.currentUser.name;
                if (userLoginBtn) userLoginBtn.textContent = '退出';
            }
            
            const addGameFab = document.getElementById('addGameFab');
            if (addGameFab) addGameFab.style.display = 'flex';
        });
    </script>
</body>
</html>
