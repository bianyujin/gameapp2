name: Sync Notion Database

# 触发方式（3种，按优先级）：
# 1. repository_dispatch: 由 Pipedream 等 Webhook 中转服务触发（最快，10-30秒）
# 2. workflow_dispatch: 手动在 GitHub Actions 页面点"Run workflow"
# 3. schedule: 每5分钟自动执行一次（兜底）
on:
  repository_dispatch:
    types: [notion-sync]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release 版本号（留空则自动生成）'
        required: false
        default: ''
  schedule:
    - cron: '*/5 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync from Notion & Publish
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
          # 需要隐藏的敏感字段名（逗号分隔，匹配到这些列名的字段不会出现在App中）
          HIDDEN_FIELDS: ${{ secrets.HIDDEN_FIELDS }}
        run: |
          node << 'SCRIPT'
          const NOTION_TOKEN = process.env.NOTION_TOKEN;
          const DATABASE_ID = process.env.NOTION_DATABASE_ID;
          const GH_PAT = process.env.GH_PAT;
          const VERSION_INPUT = process.env.VERSION_INPUT;
          // 需要隐藏的敏感字段（逗号分隔，如 "密码,内部备注,提取码"）
          const HIDDEN_FIELDS = (process.env.HIDDEN_FIELDS || '')
            .split(',')
            .map(f => f.trim().toLowerCase())
            .filter(Boolean);

          async function fetchAllPages() {
            const results = [];
            let startCursor = undefined;
            let hasMore = true;

            // 使用 Search API 查询（支持多数据源合并数据库）
            while (hasMore) {
              const body = {
                query: '',
                filter: { property: 'object', value: 'page' },
                page_size: 100,
              };
              if (startCursor) body.start_cursor = startCursor;

              const res = await fetch('https://api.notion.com/v1/search', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${NOTION_TOKEN}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify(body),
              });

              if (!res.ok) throw new Error(`Notion Search API error: ${res.status} ${await res.text()}`);
              const data = await res.json();

              // 只保留属于目标数据库的页面
              const dbPages = (data.results || []).filter(p =>
                p.parent && p.parent.type === 'database_id' &&
                p.parent.database_id === DATABASE_ID
              );
              results.push(...dbPages);

              hasMore = data.has_more;
              startCursor = data.next_cursor;
            }

            return results;
          }

          function extractValue(prop) {
            if (!prop || prop.type === null) return '';
            switch (prop.type) {
              case 'title':
                return prop.title?.map(t => t.plain_text).join('') || '';
              case 'rich_text':
                return prop.rich_text?.map(t => t.plain_text).join('') || '';
              case 'select':
                return prop.select?.name || '';
              case 'multi_select':
                return prop.multi_select?.map(s => s.name).join(', ') || '';
              case 'number':
                return prop.number ?? '';
              case 'date':
                return prop.date?.start || '';
              case 'checkbox':
                return prop.checkbox ? '是' : '否';
              case 'url':
                return prop.url || '';
              case 'email':
                return prop.email || '';
              case 'phone_number':
                return prop.phone_number || '';
              case 'files':
                return (prop.files || []).map(f => f.file?.url || f.external?.url).filter(Boolean).join(', ');
              case 'status':
                return prop.status?.name || '';
              default:
                return String(prop[prop.type] ?? '');
            }
          }

          function detectStandardField(key, prop) {
            // 检测标准字段类型用于 App 顶层显示
            const type = prop?.type;
            if (type === 'title') return 'title';
            if (key.toLowerCase().includes('图标') || key.toLowerCase().includes('icon')) return 'icon';
            if (type === 'select' || type === 'multi_select') return 'category';
            if (key.toLowerCase().includes('评分') || key.toLowerCase().includes('rating') || key.toLowerCase() === 'rating') return 'rating';
            if (key.toLowerCase().includes('描述') || key.toLowerCase().includes('简介') || key.toLowerCase().includes('介绍') || key.toLowerCase().includes('description')) return 'description';
            return null;
          }

          function transformPage(page, index) {
            const props = page.properties || {};

            // 提取所有原始字段为扁平键值对（App的 _rawData 格式）
            // 自动过滤 HIDDEN_FIELDS 中指定的敏感字段
            const _rawData = {};
            const _rawFields = [];

            for (const [key, value] of Object.entries(props)) {
              // 跳过敏感字段
              if (HIDDEN_FIELDS.some(hidden => key.toLowerCase().includes(hidden))) {
                console.log(`  ⛔ 隐藏敏感字段: ${key}`);
                continue;
              }
              _rawData[key] = extractValue(value);
              _rawFields.push(key);
            }

            // 检测标准字段
            let title = '', icon = '🎮', category = '', rating = null, description = '';

            for (const [key, value] of Object.entries(props)) {
              const stdType = detectStandardField(key, value);
              const val = extractValue(value);
              switch (stdType) {
                case 'title': title = val; break;
                case 'icon': icon = val || '🎮'; break;
                case 'category': category = val; break;
                case 'rating': rating = typeof val === 'number' ? val : parseFloat(val) || 0; break;
                case 'description': description = val; break;
              }
            }

            // 如果没找到title，用第一个字段
            if (!title) {
              const firstKey = Object.keys(props)[0];
              title = firstKey ? extractValue(props[firstKey]) : `游戏${index + 1}`;
            }

            return {
              id: index + 1,
              title,
              icon: page.icon?.emoji || icon,
              category,
              rating,
              downloads: '',
              description,
              updateDate: page.last_edited_time,
              _rawFields,
              _rawData,
            };
          }

          async function main() {
            console.log('=== Notion 同步开始 ===');
            console.log('时间:', new Date().toISOString());
            console.log('隐藏字段:', HIDDEN_FIELDS.length > 0 ? HIDDEN_FIELDS.join(', ') : '(无，全部公开)');
            
            const pages = await fetchAllPages();
            console.log(`从 Notion 获取到 ${pages.length} 条数据`);

            const games = pages.map((page, i) => transformPage(page, i));
            const fs = require('fs');
            fs.writeFileSync('games.json', JSON.stringify(games, null, 2), 'utf-8');
            console.log('games.json 已写入');

            // Git 配置
            const { execSync } = require('child_process');
            execSync('git config user.name "github-actions[bot]"', { stdio: 'inherit' });
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"', { stdio: 'inherit' });
            execSync('git add games.json', { stdio: 'inherit' });

            // 检查是否有变化
            try {
              execSync('git diff --cached --quiet', { stdio: 'pipe' });
              console.log('没有变化，跳过提交');
              return;
            } catch (_) {
              // 有变化，继续
            }

            // 生成版本号
            const now = new Date();
            const dateStr = now.toISOString().replace(/[-:T]/g, '').slice(0,14);
            const version = VERSION_INPUT && VERSION_INPUT.trim()
              ? VERSION_INPUT.trim()
              : `v${dateStr}`;

            execSync(`git commit -m "sync: ${dateStr} (${pages.length}条数据)"`, { stdio: 'inherit' });
            execSync(`git push https://x-access-token:${GH_PAT}@github.com/${process.env.GITHUB_REPOSITORY}.git HEAD:main`, { stdio: 'inherit' });

            // 创建 GitHub Release
            execSync(
              `gh release create ${version} ./games.json --title "${version}" --notes "🔄 自动同步自 Notion\n📅 ${now.toISOString()}\n📊 共 ${pages.length} 条数据"`,
              { stdio: 'inherit', env: { ...process.env, GITHUB_TOKEN: GH_PAT } }
            );
            console.log(`✅ Release ${version} 创建成功！用户即可同步更新。`);
          }

          main().catch(e => { console.error('❌ 同步失败:', e.message); process.exit(1); });
          SCRIPT
